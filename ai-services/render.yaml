services:
  - type: web
    name: civic-ai-services
    env: python
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: HF_TOKEN
      - key: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
      - key: GEMINI_API_KEY
      - key: GOOGLE_API_KEY
      - key: PORT
        value: 8000
